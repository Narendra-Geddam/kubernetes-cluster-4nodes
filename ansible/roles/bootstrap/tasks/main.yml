---
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Disable swap in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'

- name: Ensure kernel modules are loaded on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

- name: Load required kernel modules now
  ansible.builtin.command: "modprobe {{ item }}"
  loop:
    - overlay
    - br_netfilter
  changed_when: false

- name: Configure Kubernetes sysctl settings
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    mode: "0644"

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Install container runtime and base packages
  ansible.builtin.dnf:
    name:
      - containerd
      - conntrack
      - socat
      - iproute-tc
      - git
    state: present

- name: Ensure containerd config directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd config
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Enable systemd cgroup driver in containerd
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd

- name: Ensure containerd is enabled and running
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true

- name: Configure Kubernetes repository
  ansible.builtin.copy:
    dest: /etc/yum.repos.d/kubernetes.repo
    mode: "0644"
    content: |
      [kubernetes]
      name=Kubernetes
      baseurl={{ kubernetes_repo_baseurl }}
      enabled=1
      gpgcheck=1
      gpgkey={{ kubernetes_repo_gpgkey }}
      exclude=kubelet kubeadm kubectl cri-tools kubernetes-cni

- name: Install Kubernetes packages
  ansible.builtin.dnf:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    disable_excludes: kubernetes

- name: Enable kubelet
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started
