---
plugin: amazon.aws.aws_ec2
hostvars_prefix: aws_
regions:
  - "{{ lookup('env', 'AWS_REGION') | default('eu-north-1', true) }}"

filters:
  instance-state-name: running
  tag:Project:
    - kubernetes-cluster-single-az
  tag:Environment:
    - single-cluster
  tag:ManagedBy:
    - terraform

hostnames:
  - tag:Name
  - ip-address

keyed_groups:
  - key: aws_tags.Cluster
    prefix: cluster
    separator: _
  - key: aws_tags.NodeType
    prefix: node_type
    separator: _

compose:
  ansible_host: aws_public_ip_address
  ansible_user: "'ec2-user'"
  ansible_ssh_private_key_file: "lookup('env', 'ANSIBLE_PRIVATE_KEY_FILE')"
  ansible_ssh_common_args: "'-F /dev/null -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'"
